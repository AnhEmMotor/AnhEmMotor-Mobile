name: Build & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean

      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v7
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk

  build-ios:
    name: Build iOS Simulator App
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --clean

      - name: Build iOS App for Simulator
        run: |
          cd ios
          xcodebuild -workspace AnhEmMotorMobile.xcworkspace -scheme AnhEmMotorMobile -configuration Release -sdk iphonesimulator -derivedDataPath build
          cd build/Build/Products/Release-iphonesimulator
          zip -r ../../../../../ios-app.zip AnhEmMotorMobile.app

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ios-app
          path: ios-app.zip

  release:
    name: Update Release
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download APK
        uses: actions/download-artifact@v8
        with:
          name: app-release
          path: release-files/

      - name: Download iOS App
        uses: actions/download-artifact@v8
        with:
          name: ios-app
          path: release-files/

      - name: Move 'latest' tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest
          git push -f origin latest

      - name: Release Files
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Latest Release
          files: |
            release-files/app-release.apk
            release-files/ios-app.zip
          make_latest: true
